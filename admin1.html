<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NexusBot Admin — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --neon: #00ffe7;
    --neon2: #ff2d78;
    --bg: #030810;
    --surface: #080f1a;
    --border: rgba(0,255,231,0.15);
    --text: #b8e8e4;
    --text2: #4a7a74;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(0,255,231,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,231,0.02) 1px, transparent 1px);
    background-size: 50px 50px;
  }
  .orb {
    position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.08; pointer-events: none;
  }
  .orb1 { width: 600px; height: 600px; background: var(--neon); top: -200px; left: -200px; }
  .orb2 { width: 400px; height: 400px; background: var(--neon2); bottom: -150px; right: -100px; }

  .login-box {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 48px 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: 0 0 60px rgba(0,255,231,0.05), 0 40px 80px rgba(0,0,0,0.6);
    margin: 20px;
  }
  .login-box::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--neon), var(--neon2), transparent);
    border-radius: 20px 20px 0 0;
  }

  .logo { text-align: center; margin-bottom: 36px; }
  .shield {
    width: 70px; height: 70px;
    background: rgba(0,255,231,0.06);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
    font-size: 2rem;
  }
  h1 {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 4px;
    color: var(--neon);
    margin-bottom: 6px;
  }
  .sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--text2);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .field { margin-bottom: 20px; }
  label {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--text2);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  input[type=password], input[type=text] {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    color: var(--neon);
    outline: none;
    letter-spacing: 3px;
    transition: border-color 0.3s, box-shadow 0.3s;
    caret-color: var(--neon);
  }
  input:focus {
    border-color: var(--neon);
    box-shadow: 0 0 20px rgba(0,255,231,0.1);
  }

  .btn-login {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--neon), #00c4b0);
    border: none;
    border-radius: 10px;
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 4px;
    color: #030810;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .btn-login:hover { filter: brightness(1.15); transform: translateY(-1px); box-shadow: 0 8px 30px rgba(0,255,231,0.3); }
  .btn-login:active { transform: translateY(0); }
  .btn-login.loading { opacity: 0.7; pointer-events: none; }

  .error-msg {
    background: rgba(255,45,120,0.1);
    border: 1px solid rgba(255,45,120,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    color: var(--neon2);
    margin-bottom: 20px;
    display: none;
    letter-spacing: 1px;
  }
  .error-msg.show { display: block; }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--text2);
    text-decoration: none;
    letter-spacing: 2px;
    transition: color 0.3s;
  }
  .back-link:hover { color: var(--neon); }

  .warning {
    background: rgba(255,165,0,0.08);
    border: 1px solid rgba(255,165,0,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: #ffa500;
    letter-spacing: 1px;
    margin-top: 20px;
    text-align: center;
  }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="login-box">
  <div class="logo">
    <div class="shield">🛡️</div>
    <h1>ADMIN ACCESS</h1>
    <p class="sub">// nexusbot control panel</p>
  </div>

  <div class="error-msg" id="errorMsg">⚠ Invalid password. Access denied.</div>

  <div class="field">
    <label>Admin Password</label>
    <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password"/>
  </div>

  <button class="btn-login" id="loginBtn" onclick="doLogin()">LOGIN → DASHBOARD</button>

  <div class="warning">
    ⚠ RESTRICTED ACCESS · ADMINS ONLY
  </div>

  <a href="/" class="back-link">← BACK TO CONNECT PAGE</a>
</div>

<script>
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin()
})

async function doLogin() {
  const pw = document.getElementById('password').value.trim()
  if (!pw) return
  const btn = document.getElementById('loginBtn')
  btn.classList.add('loading')
  btn.textContent = 'VERIFYING...'

  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    })
    const data = await res.json()
    if (data.success) {
      btn.textContent = 'ACCESS GRANTED ✓'
      setTimeout(() => { window.location.href = '/dashboard.html' }, 600)
    } else {
      document.getElementById('errorMsg').classList.add('show')
      btn.classList.remove('loading')
      btn.textContent = 'LOGIN → DASHBOARD'
      document.getElementById('password').value = ''
      document.getElementById('password').focus()
    }
  } catch {
    document.getElementById('errorMsg').textContent = '⚠ Server error. Is the bot running?'
    document.getElementById('errorMsg').classList.add('show')
    btn.classList.remove('loading')
    btn.textContent = 'LOGIN → DASHBOARD'
  }
}
</script>
</body>
</html>
